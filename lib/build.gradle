 * Se han aï¿½adido algunas dependencias y configuraciones para adaptarlo al proyecto que usamos como base en la asignatura IS del GITT
 */

plugins {
    // Apply the java-library plugin for API and implementation separation.
    id 'java-library'
    id 'eclipse'
}

group = 'gitt.is'
version = '0.0.1-PRACTICAS'
//sourceCompatibility = '1.8'


repositories {
    // Use JCenter for resolving dependencies.
    jcenter()
}
tasks.withType(JavaCompile) {
	description = "Compilaciï¿½n del cï¿½digo"
    //Aï¿½adir la opciï¿½n Xlint
    options.deprecation = true
    options.encoding = 'ISO-8859-1'
}
tasks.withType(Javadoc){
    description = "Genera la documentacion"
    //indicar que la codificaciï¿½n es ISO
    options.docEncoding = 'ISO-8859-1'
    options.charSet = 'ISO-8859-1'
    options.docFilesSubDirs = true
    options.author = true
    options.version = true
    options.use = true
    options.memberLevel = JavadocMemberLevel.PROTECTED
    options.footer = "GITT-Ingenieria Software MagicLibrary"
    title = "Magic Libraryr"
}
//Ademï¿½s de descargarse las fuentes se descargarï¿½ el javadoc correspondiente
eclipse {
    classpath {
        downloadJavadoc = true
    }
}

dependencies {

 // JPA API
    implementation 'jakarta.persistence:jakarta.persistence-api:3.1.0'
    
    // EclipseLink (ImplementaciÃ³n de JPA)
    implementation 'org.eclipse.persistence:eclipselink:4.0.2'

    // H2 Database (VersiÃ³n mÃ¡s reciente y segura)
    implementation 'com.h2database:h2:2.2.224'

    // Beansbinding (Cuidado: es una librerÃ­a muy antigua, 
    implementation 'org.jdesktop:beansbinding:1.2.1'
	
    // JUnit 5 - Usamos el "bom" para asegurar que todas las piezas de JUnit coincidan
    testImplementation platform('org.junit:junit-bom:5.10.1')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
       
}

tasks.named('test') {
    // Use junit platform for unit tests.
    useJUnitPlatform()
}
